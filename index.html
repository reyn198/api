<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REYNOLD LIBRARY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS TETAP SAMA SEPERTI ASLINYA --- */
        :root {
            --bg: #0f172a; 
            --card: #1e293b; 
            --primary: #38bdf8; 
            --accent: #7dd3fc; 
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(56, 189, 248, 0.2);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #0284c7; 
            --accent: #0ea5e9;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: rgba(2, 132, 199, 0.1);
            --input-bg: #f1f5f9;
        }

        * { box-sizing: border-box; transition: background 0.4s, color 0.4s, border 0.4s, transform 0.3s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
        .container { max-width: 1200px; margin: auto; padding: 0 20px; }
        nav { backdrop-filter: blur(12px); background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid var(--border); padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--primary); text-decoration: none; letter-spacing: 1px; }
        .glass-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin: 30px 0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); padding: 12px; color: var(--text); border-radius: 10px; outline: none; font-size: 14px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; position: relative; border: 1px solid var(--border); height: 340px; }
        .card:hover { border-color: var(--primary); transform: translateY(-8px); }
        .card-img { width: 100%; height: 100%; object-fit: cover; background: #334155; }
        .card-body { position: absolute; inset: 0; background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 10%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; }
        .badge { position: absolute; top: 12px; left: 12px; background: var(--primary); color: #fff; padding: 5px 10px; border-radius: 8px; font-weight: 800; font-size: 10px; z-index: 2; }
        .actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; opacity: 0; z-index: 2; }
        .card:hover .actions { opacity: 1; }
        .act-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); text-decoration: none; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        
        #printableTable { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printableTable, #printableTable * { visibility: visible; }
            #printableTable { display: table; width: 100%; position: absolute; left: 0; top: 0; border-collapse: collapse; background: white; color: black; }
            th, td { border: 1px solid black; padding: 8px; }
        }
    </style>
</head>
<body>

<table id="printableTable">
    <thead>
        <tr><th>No</th><th>Nama Buku</th><th>Rilis</th><th>Genre</th><th>Kode</th></tr>
    </thead>
    <tbody id="print-body"></tbody>
</table>

<nav class="no-print">
    <div class="container nav-content">
        <a href="#" class="logo" onclick="location.reload()">REYNOLD <strong>LIBRARY</strong></a>
        <div style="display:flex; gap:10px;">
            <button onclick="toggleTheme()" class="btn" style="background:var(--input-bg); color:var(--text); border:1px solid var(--border);">🌓 TEMA</button>
            <a href="#" class="btn btn-primary" style="text-decoration:none">KONTAK</a>
        </div>
    </div>
</nav>

<div class="container no-print">
    <div style="padding: 40px 0; text-align: center;">
        <h1 style="margin:0; font-weight: 800; font-size: 32px; letter-spacing: -1px;">MILIKK MAS<span style="color:var(--primary)">MAS JAWAA</span></h1>
        <p style="color: var(--text-dim); margin-top: 5px;">SEMUA FAVORIT.</p>
    </div>

    <div class="glass-box">
        <form id="bookForm">
            <input type="hidden" id="edit-id">
            <div class="form-grid">
                <input type="text" id="judul" placeholder="Judul Buku" required>
                <select id="kategori">
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Isekai">Isekai</option>
                    <option value="Romance">Romance</option>
                    <option value="Horror">Horror</option>
                    <option value="Sains">Sains</option>
                </select>
                <input type="number" id="chapter" placeholder="Halaman">
                <input type="text" id="tahun_terbit" placeholder="Tahun Rilis">
                <input type="text" id="kode_buku" placeholder="Kode Buku" required>
                <button type="submit" class="btn btn-primary" id="btn-submit">SIMPAN</button>
            </div>
        </form>
    </div>

    <div style="display:flex; gap:15px; margin-bottom: 20px;">
        <input type="text" id="search" placeholder="Cari Koleksi..." oninput="renderBooks()" style="flex-grow: 1; border-radius: 12px; padding: 12px 20px;">
        <button onclick="window.print()" class="btn" style="background:#0ea5e9; color:#fff;">PRINT PDF</button>
        <button onclick="exportJSON()" class="btn" style="background:#6366f1; color:#fff;">JSON</button>
    </div>

    <div class="grid" id="bookGrid"></div>

    <footer style="text-align:center; padding:40px 0; border-top:1px solid var(--border); margin-top:50px; color:var(--text-dim); font-size:12px;">
        REYNOLD LIBRARY &copy; 2026
    </footer>
</div>

<script>
    // --- LOGIKA DATA (LOCAL STORAGE) ---
    let books = JSON.parse(localStorage.getItem('reynold_db')) || [];

    const form = document.getElementById('bookForm');
    const grid = document.getElementById('bookGrid');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const newBook = {
            id: id ? parseInt(id) : Date.now(),
            judul: document.getElementById('judul').value,
            kategori: document.getElementById('kategori').value,
            chapter: document.getElementById('chapter').value,
            tahun_terbit: document.getElementById('tahun_terbit').value,
            kode_buku: document.getElementById('kode_buku').value,
        };

        if (id) {
            books = books.map(b => b.id == id ? newBook : b);
        } else {
            books.push(newBook);
        }

        localStorage.setItem('reynold_db', JSON.stringify(books));
        form.reset();
        document.getElementById('edit-id').value = '';
        document.getElementById('btn-submit').innerText = 'SIMPAN';
        renderBooks();
    });

    function renderBooks() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = books.filter(b => b.judul.toLowerCase().includes(query) || b.kategori.toLowerCase().includes(query));
        
        grid.innerHTML = '';
        const printBody = document.getElementById('print-body');
        printBody.innerHTML = '';

        filtered.forEach((b, index) => {
            // Render Grid
            grid.innerHTML += `
                <div class="card">
                    <div class="badge">${b.kategori}</div>
                    <div class="actions">
                        <div class="act-btn" onclick="editBook(${b.id})">✏️</div>
                        <div class="act-btn" onclick="deleteBook(${b.id})">🗑️</div>
                    </div>
                    <div class="card-img" style="display:flex; align-items:center; justify-content:center; color:gray;">COVER</div>
                    <div class="card-body">
                        <h3 style="margin:0; font-size:16px;">${b.judul}</h3>
                        <div style="font-size:11px; color:var(--primary); margin-top:5px; font-weight:700;">
                            ${b.kode_buku} • ${b.tahun_terbit}
                        </div>
                    </div>
                </div>
            `;

            // Render Print Table
            printBody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${b.judul}</td>
                    <td>${b.tahun_terbit}</td>
                    <td>${b.kategori}</td>
                    <td>${b.kode_buku}</td>
                </tr>
            `;
        });
    }

    function deleteBook(id) {
        if(confirm('Hapus buku ini?')) {
            books = books.filter(b => b.id !== id);
            localStorage.setItem('reynold_db', JSON.stringify(books));
            renderBooks();
        }
    }

    function editBook(id) {
        const b = books.find(book => book.id === id);
        document.getElementById('edit-id').value = b.id;
        document.getElementById('judul').value = b.judul;
        document.getElementById('kategori').value = b.kategori;
        document.getElementById('chapter').value = b.chapter;
        document.getElementById('tahun_terbit').value = b.tahun_terbit;
        document.getElementById('kode_buku').value = b.kode_buku;
        document.getElementById('btn-submit').innerText = 'UPDATE';
        window.scrollTo(0, 0);
    }

    function exportJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(books, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "library_data.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function toggleTheme() {
        const h = document.documentElement;
        const n = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        h.setAttribute('data-theme', n);
        localStorage.setItem('theme', n);
    }

    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    renderBooks();
</script>

</body>
</html>
